<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>카테고리 목록</h1>

    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
    <a class="btn" th:href="@{/products}" style="background:#6c757d;">← 상품 목록</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.name}"></td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                          onsubmit="return confirm('정말 삭제하시겠습니까?');" style="display:inline;">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <hr/>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 1971377 | 성명: 이석우'}"></p>

</body>
</html>
