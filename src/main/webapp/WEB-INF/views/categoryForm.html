<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        label { display: block; margin: 16px 0 6px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .err { color: #e74c3c; margin-top: 4px; }
        .btn { display: inline-block; padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 16px; }
        .btn-back { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

    <h1>카테고리 등록</h1>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <label for="name">카테고리 이름</label>
        <input type="text" id="name" th:field="*{name}" placeholder="카테고리 이름 입력"/>
        <div class="err" th:errors="*{name}"></div>

        <button type="submit" class="btn">등록</button>
        <a class="btn-back" th:href="@{/categories}">취소</a>
    </form>

    <hr/>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 1971377 | 성명: 이석우'}"></p>

</body>
</html>
